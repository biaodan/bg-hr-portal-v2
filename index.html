<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отдел Човешки Ресурси</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background: #f4f7f6; 
        }
        .card { 
            text-align: center; 
            width: 90%; 
            max-width: 360px; 
            padding: 30px 20px; 
            box-sizing: border-box; 
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        
        .avatar-container {
            position: relative;
            width: 85px;
            height: 85px;
            margin: 0 auto 15px;
        }
        .avatar { 
            width: 100%; 
            height: 100%; 
            background: #eef2f1; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 45px;
            border: 3px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .online-status {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 15px;
            height: 15px;
            background: #4CAF50;
            border: 2px solid #fff;
            border-radius: 50%;
        }

        .department { 
            font-size: 14px;
            color: #2E7D32;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .title { 
            font-size: 20px; 
            font-weight: bold; 
            color: #1a1a1a; 
            margin-bottom: 15px; 
        }
        
        .desc { 
            font-size: 15px; 
            color: #666; 
            line-height: 1.6; 
            margin-bottom: 25px; 
            text-align: center; 
        }
        
        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #25D366; 
            color: white; 
            text-decoration: none; 
            padding: 16px; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 17px; 
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(37,211,102,0.2);
        }
        
        .btn:active { transform: scale(0.98); }

        .btn:before { 
            content: '💬'; 
            margin-right: 10px; 
        }
        
        .busy-note { 
            font-size: 12px; 
            color: #999; 
            margin-top: 20px; 
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 顶部：头像 -->
        <div class="avatar-container">
            <div class="avatar">👩‍💼</div>
            <div class="online-status"></div>
        </div>

        <!-- 中间：人力资源部 -->
        <div class="department">Отдел "Човешки ресурси"</div>
        <div class="title">Официален консултант</div>
        
        <!-- 下面：介绍文案 -->
        <div class="desc">
            Здравейте! Аз съм вашият назначен консултант. Свържете се с мен в <b>WhatsApp</b>, за да получите подробна информация за проекта и следващите стъпки.
        </div>
        
        <!-- 分流链接已更新 -->
        <a href="https://svip1027.top/BAJLYUU668" class="btn">ЗАПОЧНЕТЕ ЧАТ</a>
        
        <div class="busy-note">
            * Обикновено отговаряме в рамките на няколко минути.
        </div>
    </div>
</body>
</html>
